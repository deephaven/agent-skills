name: Deephaven Core Skill CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'skills/deephaven-core-query-writing/**'
      - 'tools/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        working-directory: tools
        run: uv sync

      - name: Validate skill structure
        working-directory: tools
        run: uv run validate

      - name: Check Python syntax in code blocks
        working-directory: tools
        run: uv run check-python

      - name: Check internal links
        working-directory: tools
        run: uv run check-links
