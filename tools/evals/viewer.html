<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eval Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT" crossorigin="anonymous"></script>
  <!-- highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
  <style>
    :root {
      --bg: #faf9f5;
      --surface: #ffffff;
      --border: #e8e6dc;
      --text: #141413;
      --text-muted: #b0aea5;
      --accent: #d97757;
      --accent-hover: #c4613f;
      --green: #788c5d;
      --green-bg: #eef2e8;
      --red: #c44;
      --red-bg: #fceaea;
      --header-bg: #141413;
      --header-text: #faf9f5;
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lora', Georgia, serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- Header ---- */
    .header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: 1rem;
    }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .header .instructions {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 0.25rem;
    }
    .eval-select {
      font-family: 'Poppins', sans-serif;
      font-size: 0.8125rem;
      padding: 0.375rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      min-width: 280px;
      max-width: 400px;
    }
    .header .progress {
      font-size: 0.875rem;
      opacity: 0.8;
      text-align: right;
      white-space: nowrap;
    }

    /* ---- Main content ---- */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ---- Sections ---- */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .section-header {
      font-family: 'Poppins', sans-serif;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .section-body {
      padding: 1rem;
    }

    /* ---- Eval title row ---- */
    .eval-title-row {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 1rem;
    }
    .eval-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .eval-nav-counter {
      font-family: 'Poppins', sans-serif;
      font-size: 0.8125rem;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    /* ---- Eval navigator (right-aligned) ---- */
    .eval-nav {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .eval-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.25rem;
      height: 2.25rem;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text);
      font-size: 1rem;
      flex-shrink: 0;
      transition: background 0.12s;
    }
    .eval-nav-btn:hover:not(:disabled) { background: var(--bg); }
    .eval-nav-btn:disabled { opacity: 0.25; cursor: default; }
    .eval-nav-btn svg { width: 16px; height: 16px; }
    .eval-nav select {
      font-family: 'Poppins', sans-serif;
      font-size: 0.8125rem;
      padding: 0.375rem 0.5rem;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      cursor: pointer;
      min-width: 260px;
      height: 2.25rem;
      outline: none;
    }
    .eval-nav select:focus { background: var(--bg); }

    /* ---- Config badge ---- */
    .config-badge {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-left: 0.75rem;
      vertical-align: middle;
    }
    .config-badge.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .config-badge.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Prompt ---- */
    .prompt-text {
      white-space: pre-wrap;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    /* ---- Split comparison cards ---- */
    .comparison-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5rem;
      margin-bottom: 1rem;
    }
    .comparison-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      font-family: 'Poppins', sans-serif;
    }
    .comparison-card-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.625rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .comparison-card-title.config-primary { color: #1976d2; }
    .comparison-card-title.config-baseline { color: #f57f17; }
    .comparison-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.25rem 0;
      font-size: 0.8125rem;
    }
    .comparison-row-label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .comparison-row-value {
      font-weight: 500;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
    }
    .comparison-card.config-primary .comparison-row-value.winner {
      background: rgba(33, 150, 243, 0.12);
    }
    .comparison-card.config-baseline .comparison-row-value.winner {
      background: rgba(255, 193, 7, 0.15);
    }
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1.5rem;
    }
    .split-grid > * {
      min-width: 0;
    }
    .split-row {
      display: grid;
      grid-template-columns: subgrid;
      grid-column: 1 / -1;
      gap: 0 1.5rem;
      margin-bottom: 1.25rem;
    }
    .split-row > div {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .split-row > div > .output-file {
      border: none;
      border-radius: 0;
    }
    /* Grades sub-grid: each assertion row aligns across columns */
    .grades-pair {
      display: grid;
      grid-template-columns: subgrid;
      grid-column: 1 / -1;
      margin-bottom: 1.25rem;
    }
    .grades-pair > .grades-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: grid;
      grid-template-rows: subgrid;
      grid-row: 1 / -1;
      overflow: hidden;
    }
    .grades-assertion-row {
      padding: 0.625rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .grades-assertion-row:last-child { border-bottom: none; }
    .grades-summary-row {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .split-pane-header {
      font-family: 'Poppins', sans-serif;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      text-align: center;
    }
    .split-pane-header.config-primary {
      background: rgba(33, 150, 243, 0.12);
      color: #1976d2;
    }
    .split-pane-header.config-baseline {
      background: rgba(255, 193, 7, 0.15);
      color: #f57f17;
    }

    /* ---- Outputs ---- */
    .output-file {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .output-file + .output-file {
      margin-top: 1rem;
    }
    .output-file-header {
      padding: 0.5rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .output-file-header .dl-btn {
      font-size: 0.7rem;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 500;
      opacity: 0.8;
    }
    .output-file-header .dl-btn:hover {
      opacity: 1;
      text-decoration: underline;
    }
    .output-file-content {
      padding: 0.75rem;
      overflow-x: auto;
    }
    .output-file-content pre {
      font-size: 0.8125rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .output-file-content pre code.hljs {
      background: transparent;
      padding: 0;
    }
    .output-file-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .output-file-content iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    .output-file-content table {
      border-collapse: collapse;
      font-size: 0.8125rem;
      width: 100%;
    }
    .output-file-content table td,
    .output-file-content table th {
      border: 1px solid var(--border);
      padding: 0.375rem 0.5rem;
      text-align: left;
    }
    .output-file-content table th {
      background: var(--bg);
      font-weight: 600;
    }
    .output-file-content .download-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
      cursor: pointer;
    }
    .output-file-content .download-link:hover {
      background: var(--border);
    }
    /* Rendered markdown */
    .rendered-markdown {
      font-size: 0.875rem;
      line-height: 1.65;
    }
    .rendered-markdown h1 { font-size: 1.15rem; margin: 0.75rem 0 0.5rem; font-family: 'Poppins', sans-serif; }
    .rendered-markdown h2 { font-size: 1.0rem; margin: 0.75rem 0 0.375rem; font-family: 'Poppins', sans-serif; }
    .rendered-markdown h3 { font-size: 0.9375rem; margin: 0.5rem 0 0.25rem; font-family: 'Poppins', sans-serif; }
    .rendered-markdown p { margin: 0.375rem 0; }
    .rendered-markdown ul, .rendered-markdown ol { padding-left: 1.5rem; margin: 0.375rem 0; }
    .rendered-markdown li { margin: 0.2rem 0; }
    .rendered-markdown code {
      background: var(--bg);
      padding: 0.125rem 0.375rem;
      border-radius: 3px;
      font-size: 0.8125rem;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .rendered-markdown pre {
      background: var(--bg);
      padding: 0.625rem 0.75rem;
      border-radius: 4px;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .rendered-markdown pre code {
      background: transparent;
      padding: 0;
    }
    .rendered-markdown strong { font-weight: 600; }
    .rendered-markdown hr { border: none; border-top: 1px solid var(--border); margin: 0.75rem 0; }
    .rendered-markdown table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.5rem 0;
      font-size: 0.8rem;
    }
    .rendered-markdown th, .rendered-markdown td {
      border: 1px solid var(--border);
      padding: 0.35rem 0.6rem;
      text-align: left;
    }
    .rendered-markdown th {
      background: var(--bg);
      font-weight: 600;
    }
    .rendered-markdown tr:nth-child(even) td { background: var(--bg); }
    .rendered-markdown blockquote {
      border-left: 3px solid var(--border);
      margin: 0.5rem 0;
      padding: 0.25rem 0.75rem;
      color: var(--text-muted);
    }
    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      padding: 2rem;
      text-align: center;
    }

    /* ---- Grades (non-collapsed) ---- */
    .grades-summary {
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grade-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .grade-pass { background: var(--green-bg); color: var(--green); }
    .grade-fail { background: var(--red-bg); color: var(--red); }
    .assertion-list {
      list-style: none;
    }
    .assertion-item {
      padding: 0.625rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .assertion-item:last-child { border-bottom: none; }
    .assertion-status {
      font-weight: 600;
      margin-right: 0.5rem;
    }
    .assertion-status.pass { color: var(--green); }
    .assertion-status.fail { color: var(--red); }
    .assertion-evidence {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      padding-left: 1.5rem;
    }

    /* ---- View tabs ---- */
    .view-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-tab {
      font-family: 'Poppins', sans-serif;
      padding: 0.625rem 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .view-panel { display: none; }
    .view-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ---- Benchmark view ---- */
    .benchmark-view {
      padding: 1.5rem 2rem;
      overflow-y: auto;
      flex: 1;
    }
    .benchmark-table {
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8125rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .benchmark-table th, .benchmark-table td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border: 1px solid var(--border);
    }
    .benchmark-table th {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .benchmark-table tr:hover { background: var(--bg); }
    .benchmark-table tr.benchmark-row-with { background: rgba(25, 118, 210, 0.04); }
    .benchmark-table tr.benchmark-row-without { background: rgba(245, 127, 23, 0.04); }
    .benchmark-table tr.benchmark-row-with:hover { background: rgba(25, 118, 210, 0.08); }
    .benchmark-table tr.benchmark-row-without:hover { background: rgba(245, 127, 23, 0.08); }
    .benchmark-table tr.benchmark-row-avg { font-weight: 600; border-top: 2px solid var(--border); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-with { background: rgba(25, 118, 210, 0.08); }
    .benchmark-table tr.benchmark-row-avg.benchmark-row-without { background: rgba(245, 127, 23, 0.08); }
    .benchmark-delta-positive { color: var(--green); font-weight: 600; }
    .benchmark-delta-negative { color: var(--red); font-weight: 600; }
    .benchmark-notes {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }
    .benchmark-notes h3 {
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }
    .benchmark-notes ul {
      list-style: disc;
      padding-left: 1.25rem;
    }
    .benchmark-notes li {
      font-size: 0.8125rem;
      line-height: 1.6;
      margin-bottom: 0.375rem;
    }
    .benchmark-empty {
      color: var(--text-muted);
      font-style: italic;
      text-align: center;
      padding: 3rem;
    }
    .benchmark-meta {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem 2rem;
      margin-bottom: 1.5rem;
      font-size: 0.8125rem;
    }
    .benchmark-meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
    }
    .benchmark-meta-label {
      color: var(--text-muted);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .benchmark-meta-value {
      color: var(--text);
      font-weight: 600;
    }
    .benchmark-table th.group-with {
      background: rgba(25, 118, 210, 0.10);
      color: #1976d2;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      border-bottom: 2px solid rgba(25, 118, 210, 0.3);
    }
    .benchmark-table th.group-without {
      background: rgba(245, 127, 23, 0.08);
      color: #e65100;
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      border-bottom: 2px solid rgba(245, 127, 23, 0.3);
    }
    .benchmark-table th.sub-with {
      background: rgba(25, 118, 210, 0.04);
      color: var(--text-muted);
      font-size: 0.625rem;
      text-align: right;
      padding: 0.375rem 0.625rem;
    }
    .benchmark-table th.sub-without {
      background: rgba(245, 127, 23, 0.03);
      color: var(--text-muted);
      font-size: 0.625rem;
      text-align: right;
      padding: 0.375rem 0.625rem;
    }
    .benchmark-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 0.8125rem;
    }
    .benchmark-table td.num.muted {
      color: var(--text);
    }
    .benchmark-table td.group-sep {
      border-left: 2px solid var(--border);
    }
    .benchmark-table td.winner-with {
      background: rgba(33, 150, 243, 0.12);
    }
    .benchmark-table td.winner-without {
      background: rgba(255, 193, 7, 0.15);
    }
    .benchmark-overview-row {
      cursor: pointer;
      color: var(--text);
    }
    .benchmark-overview-row:hover td {
      background: var(--border) !important;
    }
    .benchmark-overview-row:nth-child(even) td {
      background: var(--bg);
    }
    .benchmark-overview-row:nth-child(even):hover td {
      background: var(--border) !important;
    }
    .benchmark-overview-row td:first-child {
      font-weight: 500;
    }
    .benchmark-overview-footer td {
      background: var(--bg);
      border-top: 2px solid var(--border);
      font-size: 0.75rem;
      color: var(--text);
    }
    .benchmark-eval-divider {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ---- Skill Tokens view ---- */
    .token-bar-container { display: flex; align-items: center; gap: 0.5rem; }
    .token-bar { height: 20px; background: var(--accent); border-radius: 3px; min-width: 2px; transition: width 0.3s; }
    .token-summary-card { display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .token-summary-stat {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.5rem; text-align: center;
    }
    .token-summary-stat .stat-value { font-size: 1.75rem; font-weight: 600; font-family: Poppins, sans-serif; }
    .token-summary-stat .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* ---- Recommendation summary cards ---- */
    .rec-summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 768px) {
      .rec-summary-grid { grid-template-columns: 1fr; }
    }
    .rec-summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      min-width: 0;
    }
    .rec-summary-grid > .rec-summary-card { margin-bottom: 0; }
    .rec-card-with { border-top: 3px solid rgba(25,118,210,0.5); }
    .rec-card-without { border-top: 3px solid rgba(245,127,23,0.5); }
    .rec-summary-label {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .rec-summary-body {
      font-size: 0.8rem;
      line-height: 1.55;
      color: var(--text);
    }
    .rec-summary-body h2 {
      font-size: 0.85rem;
      margin: 0.75rem 0 0.35rem;
      color: var(--text);
    }
    .rec-summary-body h3 {
      font-size: 0.8rem;
      margin: 0.5rem 0 0.25rem;
      color: var(--text);
    }
    .rec-summary-body ul { padding-left: 1.25rem; margin: 0.25rem 0; }
    .rec-summary-body li { margin-bottom: 0.2rem; }
    .rec-summary-body code {
      font-size: 0.75rem;
      background: var(--bg);
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
    }

    /* ---- Collapsible section ---- */
    .section-header-toggle {
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .section-header-toggle:hover { color: var(--text); }
    .section-header-toggle .toggle-icon {
      font-size: 0.65rem;
      transition: transform 0.15s;
    }
    .section-header-toggle.collapsed .toggle-icon {
      transform: rotate(-90deg);
    }
    .section-body-collapsible {
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .section-body-collapsible.collapsed {
      max-height: 0 !important;
      padding: 0;
    }

    /* ---- Transcript viewer ---- */
    .transcript-scroll {
      padding: 0.375rem 0.75rem;
      max-height: 600px;
      overflow-y: auto;
    }
    .transcript-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.2rem 0.25rem;
      font-size: 0.75rem;
      line-height: 1.35;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    .transcript-row:last-child { border-bottom: none; }
    .transcript-row:hover { background: var(--bg); }

    .t-badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 9999px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
      min-width: 3.25rem;
      text-align: center;
      flex-shrink: 0;
    }
    .t-badge-user { background: rgba(33,150,243,0.14); color: #1565c0; }
    .t-badge-think { background: rgba(156,39,176,0.12); color: #7b1fa2; }
    .t-badge-text { background: rgba(0,150,136,0.14); color: #00695c; }
    .t-badge-tool { }
    .t-badge-result { background: transparent; color: var(--text-muted); font-weight: 500; min-width: 3.25rem; border: 1px solid var(--border); }

    .t-time {
      color: var(--text-muted);
      font-size: 0.6875rem;
      white-space: nowrap;
      min-width: 3.25rem;
      text-align: right;
      flex-shrink: 0;
    }
    .t-preview {
      flex: 1;
      overflow: hidden;

      white-space: nowrap;
      color: var(--text);
      font-size: 0.75rem;

    .t-status { font-weight: 600; font-size: 0.75rem; flex-shrink: 0; }
    .t-status-ok { color: var(--green); }
    .t-status-err { color: var(--red); }
    .t-tokens {
      color: var(--text-muted);
      font-size: 0.6rem;
      white-space: nowrap;
      flex-shrink: 0;

    .transcript-summary {
      font-family: 'Poppins', sans-serif;
      font-size: 0.6875rem;
      color: var(--text-muted);
      font-weight: 400;

    .transcript-row[style*="cursor"] { position: relative; }
    .transcript-row[style*="cursor"]:hover { background: rgba(217, 119, 87, 0.04); }
    .transcript-row.expanded {
      background: var(--bg);
      border-bottom-color: transparent;
    }
    .t-expanded {
      padding: 0.375rem 0.75rem 0.5rem 4.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .t-expanded pre {
      font-size: 0.75rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      color: var(--text);
      margin: 0;
      max-height: 300px;
      overflow-y: auto;
