</head>
<body>
  <div id="app" style="height:100vh; display:flex; flex-direction:column;">
    <div class="header">
      <div>
        <h1>Eval Review: <span id="skill-name"></span></h1>
      </div>
    </div>

    <!-- View tabs (only shown when benchmark data exists) -->
    <div class="view-tabs" id="view-tabs" style="display:none;">
      <button class="view-tab active" onclick="switchView('outputs')">Outputs</button>
      <button class="view-tab" onclick="switchView('benchmark')">Benchmark</button>
      <button class="view-tab" onclick="switchView('skill-tokens')">Skill Tokens</button>
    </div>

    <!-- Outputs panel (qualitative review) -->
    <div class="view-panel active" id="panel-outputs">
    <div class="main" id="outputs-main">
      <!-- Dynamic content rendered by JS -->
    </div>
    </div><!-- end panel-outputs -->

    <!-- Benchmark panel (quantitative stats) -->
    <div class="view-panel" id="panel-benchmark">
      <div class="benchmark-view" id="benchmark-content">
        <div class="benchmark-empty">No benchmark data available. Run a benchmark to see quantitative results here.</div>
      </div>
    </div>

    <!-- Skill Tokens panel -->
    <div class="view-panel" id="panel-skill-tokens">
      <div class="benchmark-view" id="skill-tokens-content">
        <div class="benchmark-empty">No skill token data available.</div>
      </div>
    </div>
  </div>


  <script>
    // ---- Embedded data (injected by generate_review.py) ----
    /*__EMBEDDED_DATA__*/

    // ---- State ----
    let currentEvalIndex = 0;
    let evalGroups = [];  // [{eval_name, eval_id, prompt, runs: [{config, run}]}]

    // ---- Build eval groups from flat runs ----
    function buildEvalGroups() {
      const runs = EMBEDDED_DATA.runs || [];
      const map = {};
      for (const run of runs) {
        const key = run.eval_name || run.eval_id || run.id;
        if (!map[key]) {
          map[key] = {
            eval_name: run.eval_name || key,
            eval_id: run.eval_id,
            prompt: run.prompt,
            runs: [],
          };
        }
        map[key].runs.push(run);
      }
      evalGroups = Object.values(map);
      // Sort by eval_id
      evalGroups.sort((a, b) => (a.eval_id || 0) - (b.eval_id || 0));
    }

    // ---- Init ----
    function init() {
      document.getElementById("skill-name").textContent = EMBEDDED_DATA.skill_name;
      buildEvalGroups();
      showEval(0);
    }

    function onSelectEval(val) {
      showEval(parseInt(val));
    }

    // ---- Navigation ----
    function navigate(delta) {
      const newIndex = currentEvalIndex + delta;
      if (newIndex >= 0 && newIndex < evalGroups.length) {
        showEval(newIndex);
      }
    }

    // ---- Show an eval group ----
    function showEval(index) {
      currentEvalIndex = index;
      const group = evalGroups[index];
      const container = document.getElementById("outputs-main");
      container.innerHTML = "";


      // Title row: [title] ... [N of N] [< dropdown >]
      const titleRow = document.createElement("div");
      titleRow.className = "eval-title-row";

      const titleDiv = document.createElement("div");
      titleDiv.className = "eval-title";
      titleDiv.textContent = group.eval_name.replace(/-/g, " ");
      titleRow.appendChild(titleDiv);

      const counter = document.createElement("span");
      counter.className = "eval-nav-counter";
      counter.textContent = (index + 1) + " of " + evalGroups.length;
      titleRow.appendChild(counter);

      const nav = document.createElement("div");
      nav.className = "eval-nav";

      const prevBtn = document.createElement("button");
      prevBtn.className = "eval-nav-btn";
      prevBtn.id = "prev-btn";
      prevBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
      prevBtn.onclick = function() { navigate(-1); };
      prevBtn.disabled = index === 0;
      nav.appendChild(prevBtn);

      const select = document.createElement("select");
      select.id = "eval-select";
      select.onchange = function() { onSelectEval(this.value); };
      for (let i = 0; i < evalGroups.length; i++) {
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = (i + 1) + ". " + evalGroups[i].eval_name.replace(/-/g, " ");
        if (i === index) opt.selected = true;
        select.appendChild(opt);
      }
      nav.appendChild(select);

      const nextBtn = document.createElement("button");
      nextBtn.className = "eval-nav-btn";
      nextBtn.id = "next-btn";
      nextBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
      nextBtn.onclick = function() { navigate(1); };
      nextBtn.disabled = index === evalGroups.length - 1;
      nav.appendChild(nextBtn);

      titleRow.appendChild(nav);
      container.appendChild(titleRow);

      // Prompt section
      const promptSection = document.createElement("div");
      promptSection.className = "section";
      promptSection.innerHTML =
        '<div class="section-header">Prompt</div>' +
        '<div class="section-body"><div class="prompt-text">' + escapeHtml(group.prompt) + '</div></div>';
      container.appendChild(promptSection);

      // Determine if this is a paired (split) view
      const withRuns = group.runs.filter(r => r.configuration === "with_skill");
      const withoutRuns = group.runs.filter(r => r.configuration === "without_skill");
      const isPaired = withRuns.length > 0 && withoutRuns.length > 0;

      if (isPaired) {
        // Use first run of each config
        const withRun = withRuns[0];
        const withoutRun = withoutRuns[0];

        // Comparison stats header
        const statsDiv = document.createElement("div");
        statsDiv.className = "comparison-header";
        statsDiv.innerHTML = buildComparisonStats(withRun, withoutRun);
        container.appendChild(statsDiv);

        // Grid-based split: each section pair shares a row
        const grid = document.createElement("div");
        grid.className = "split-grid";

        // Row: column headers
        addGridRow(grid, [
          '<div class="split-pane-header config-primary">With Skill</div>',
          '<div class="split-pane-header config-baseline">Without Skill</div>',
        ]);

        // Grades: sub-grid with aligned assertion rows
        renderPairedGrades(grid, withRun.grading, withoutRun.grading);

        // Output files: paired by name, each wrapped in .section
        const withOutputs = withRun.outputs || [];
        const withoutOutputs = withoutRun.outputs || [];
        const allNames = [...new Set([...withOutputs.map(f => f.name), ...withoutOutputs.map(f => f.name)])];
        for (const name of allNames) {
          const wFile = withOutputs.find(f => f.name === name);
          const woFile = withoutOutputs.find(f => f.name === name);
          const row = document.createElement("div");
          row.className = "split-row";
          const leftCell = document.createElement("div");
          const rightCell = document.createElement("div");
          if (wFile) { renderSingleOutputFile(leftCell, wFile); } else { leftCell.innerHTML = '<div class="empty-state">—</div>'; }
          if (woFile) { renderSingleOutputFile(rightCell, woFile); } else { rightCell.innerHTML = '<div class="empty-state">—</div>'; }
          row.appendChild(leftCell);
          row.appendChild(rightCell);
          grid.appendChild(row);
        }

        container.appendChild(grid);
      } else {
        // Single run view
        for (const run of group.runs) {
          renderRunPane(container, run);
        }
      }

      // Scroll to top
      container.scrollTop = 0;
    }

    // ---- Build comparison stats ----
    function buildComparisonStats(withRun, withoutRun) {
      // Gather all stats as {label, wVal, woVal, wFmt, woFmt, winMode}
      const stats = [];

      const withTurns = withRun.metrics?.total_turns ?? withRun.timing?.num_turns;
      const withoutTurns = withoutRun.metrics?.total_turns ?? withoutRun.timing?.num_turns;
      if (withTurns != null || withoutTurns != null) {
        stats.push({ label: "Turns", wVal: withTurns, woVal: withoutTurns,
          wFmt: withTurns != null ? withTurns : "—",
          woFmt: withoutTurns != null ? withoutTurns : "—",
          winMode: "lower" });
      }

      const withTime = withRun.metrics?.duration_seconds || withRun.timing?.total_duration_seconds;
      const withoutTime = withoutRun.metrics?.duration_seconds || withoutRun.timing?.total_duration_seconds;
      if (withTime != null || withoutTime != null) {
        stats.push({ label: "Time", wVal: withTime, woVal: withoutTime,
          wFmt: withTime != null ? withTime.toFixed(1) + "s" : "—",
          woFmt: withoutTime != null ? withoutTime.toFixed(1) + "s" : "—",
          winMode: "lower" });
      }

      const withTokens = withRun.metrics?.token_usage;
      const withoutTokens = withoutRun.metrics?.token_usage;
      if (withTokens || withoutTokens) {
        const wIn = withTokens?.total_input_tokens;
        const woIn = withoutTokens?.total_input_tokens;
        stats.push({ label: "Base Input Tokens", wVal: wIn, woVal: woIn,
          wFmt: wIn != null ? fmtNum(wIn) : "—",
          woFmt: woIn != null ? fmtNum(woIn) : "—",
          winMode: "lower" });

        const wOut = withTokens?.total_output_tokens;
        const woOut = withoutTokens?.total_output_tokens;
        stats.push({ label: "Output Tokens", wVal: wOut, woVal: woOut,
          wFmt: wOut != null ? fmtNum(wOut) : "—",
          woFmt: woOut != null ? fmtNum(woOut) : "—",
          winMode: "lower" });

        const wCacheRead = withTokens?.total_cache_read_tokens;
        const woCacheRead = withoutTokens?.total_cache_read_tokens;
        stats.push({ label: "Cache Read Tokens", wVal: wCacheRead, woVal: woCacheRead,
          wFmt: wCacheRead != null ? fmtNum(wCacheRead) : "—",
          woFmt: woCacheRead != null ? fmtNum(woCacheRead) : "—",
          winMode: "lower" });

        const wCache5m = withTokens?.total_cache_creation_5m_tokens;
        const woCache5m = withoutTokens?.total_cache_creation_5m_tokens;
        if ((wCache5m || 0) > 0 || (woCache5m || 0) > 0) {
          stats.push({ label: "Cache Write 5m Tokens", wVal: wCache5m, woVal: woCache5m,
            wFmt: wCache5m != null ? fmtNum(wCache5m) : "—",
            woFmt: woCache5m != null ? fmtNum(woCache5m) : "—",
            winMode: "lower" });
        }

        const wCache1h = withTokens?.total_cache_creation_1h_tokens;
        const woCache1h = withoutTokens?.total_cache_creation_1h_tokens;
        if ((wCache1h || 0) > 0 || (woCache1h || 0) > 0) {
          stats.push({ label: "Cache Write 1h Tokens", wVal: wCache1h, woVal: woCache1h,
            wFmt: wCache1h != null ? fmtNum(wCache1h) : "—",
            woFmt: woCache1h != null ? fmtNum(woCache1h) : "—",
            winMode: "lower" });
        }

        const wCost = withTokens?.estimated_cost_usd;
        const woCost = withoutTokens?.estimated_cost_usd;
        if (wCost != null || woCost != null) {
          stats.push({ label: "Estimated Cost", wVal: wCost, woVal: woCost,
            wFmt: wCost != null ? "$" + wCost.toFixed(2) : "—",
            woFmt: woCost != null ? "$" + woCost.toFixed(2) : "—",
            winMode: "lower" });
        }
      }

      const withGrade = withRun.grading?.summary;
      const withoutGrade = withoutRun.grading?.summary;
      if (withGrade || withoutGrade) {
        const wRate = withGrade?.pass_rate;
        const woRate = withoutGrade?.pass_rate;
        stats.push({ label: "Pass Rate", wVal: wRate, woVal: woRate,
          wFmt: wRate != null ? Math.round(wRate * 100) + "%" : "—",
          woFmt: woRate != null ? Math.round(woRate * 100) + "%" : "—",
          winMode: "higher" });
      }

      // Determine winners per stat
      const winners = stats.map(s => {
        if (s.wVal != null && s.woVal != null && s.wVal !== s.woVal) {
          return (s.winMode === "higher" ? s.wVal > s.woVal : s.wVal < s.woVal) ? "with" : "without";
        }
        return null;
      });

      // Build two cards
      function buildCard(side, cssClass, title) {
        let html = '<div class="comparison-card ' + cssClass + '">';
        html += '<div class="comparison-card-title ' + (side === "with" ? "config-primary" : "config-baseline") + '">' + title + '</div>';
        for (let i = 0; i < stats.length; i++) {
          const s = stats[i];
          const val = side === "with" ? s.wFmt : s.woFmt;
          const isWinner = winners[i] === side;
          html += '<div class="comparison-row">';
          html += '<span class="comparison-row-label">' + s.label + '</span>';
          html += '<span class="comparison-row-value' + (isWinner ? " winner" : "") + '">' + val + '</span>';
          html += '</div>';
        }
        html += '</div>';
        return html;
      }

      return buildCard("with", "config-primary", "With Skill") +
             buildCard("without", "config-baseline", "Without Skill");
    }

    // ---- Render a single run into a pane (used for non-paired view) ----
    function renderRunPane(container, run) {
      if (run.grading) {
        const gradesSection = document.createElement("div");
        gradesSection.className = "section";
        gradesSection.innerHTML = '<div class="section-header">Grades</div>';
        const gradesBody = document.createElement("div");
        gradesBody.className = "section-body";
        gradesBody.innerHTML = buildGradesHtml(run.grading);
        gradesSection.appendChild(gradesBody);
        container.appendChild(gradesSection);
      }

      const outputsSection = document.createElement("div");
      outputsSection.className = "section";
      outputsSection.innerHTML = '<div class="section-header">Output</div>';
      const outputsBody = document.createElement("div");
      outputsBody.className = "section-body";
      renderOutputFiles(outputsBody, run.outputs || []);
      outputsSection.appendChild(outputsBody);
      container.appendChild(outputsSection);
    }

    // ---- JSONL transcript parser & renderer ----
    function decodeJsonlBase64(dataUri) {
      if (!dataUri) return [];
      var b64 = dataUri.split(",")[1];
      if (!b64) return [];
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
      var text = new TextDecoder().decode(bytes);
      var events = [];
      var lines = text.split("\n");
      for (var j = 0; j < lines.length; j++) {
        if (!lines[j].trim()) continue;
        try { events.push(JSON.parse(lines[j])); } catch(e) {}
      }
      return events;
    }

    function toolInputPreview(name, input) {
      if (!input) return "";
      if (name === "Read" || name === "Write") return (input.file_path || "").split("/").pop() || JSON.stringify(input).substring(0, 60);
      if (name === "Bash") { var c = input.command || ""; return c.length > 80 ? c.substring(0, 77) + "..." : c; }
      if (name === "Glob") return input.pattern || JSON.stringify(input).substring(0, 60);
      if (name === "Grep") return input.pattern || JSON.stringify(input).substring(0, 60);
      if (name === "Edit") return (input.file_path || "").split("/").pop() || JSON.stringify(input).substring(0, 60);
      var s = JSON.stringify(input);
      return s.length > 60 ? s.substring(0, 57) + "..." : s;
    }

    function jsonlToTurns(events) {
      var turns = [];
      var t0 = null;

      // First pass: merge assistant events by message ID (progressive streaming chunks)
      var merged = [];
      var assistantById = {};  // msgId -> {blocks:[], usage:{}, ts, stopReason}

      for (var i = 0; i < events.length; i++) {
        var evt = events[i];
        if (evt.type === "user") {
          merged.push(evt);
        } else if (evt.type === "assistant") {
          var msgId = evt.message && evt.message.id;
          if (msgId && assistantById[msgId]) {
            // Merge: append new blocks, update usage/stop
            var existing = assistantById[msgId];
            var newBlocks = (evt.message && evt.message.content) || [];
            for (var nb = 0; nb < newBlocks.length; nb++) existing.blocks.push(newBlocks[nb]);
            if (evt.message && evt.message.usage) existing.usage = evt.message.usage;
            if (evt.message && evt.message.stop_reason) existing.stopReason = evt.message.stop_reason;
          } else {
            var entry = {
              type: "assistant",
              timestamp: evt.timestamp,
              blocks: (evt.message && evt.message.content) ? evt.message.content.slice() : [],
              usage: (evt.message && evt.message.usage) || {},
              stopReason: evt.message && evt.message.stop_reason
            };
            if (msgId) assistantById[msgId] = entry;
            merged.push(entry);
          }
        }
        // Skip queue-operation and other types
      }

      // Second pass: convert merged events to turns
      for (var j = 0; j < merged.length; j++) {
        var m = merged[j];
        var ts = m.timestamp ? new Date(m.timestamp).getTime() : null;
        if (ts && !t0) t0 = ts;
        var ms = (ts && t0) ? ts - t0 : 0;

        if (m.type === "user") {
          var content = m.message && m.message.content;
          if (Array.isArray(content)) {
            for (var k = 0; k < content.length; k++) {
              var block = content[k];
              if (block.type === "tool_result") {
                var full = typeof block.content === "string" ? block.content : JSON.stringify(block.content || "", null, 2);
                turns.push({ type: "result", ms: ms, ok: !block.is_error,
                  preview: full.split("\n")[0].substring(0, 100), full: full });
              }
            }
          } else if (typeof content === "string") {
            turns.push({ type: "user", ms: ms,
              preview: content.split("\n")[0].substring(0, 120), full: content });
          }
        } else if (m.type === "assistant") {
          var usage = m.usage || {};
          var tok = (usage.input_tokens || usage.output_tokens) ? {
            i: usage.input_tokens || 0,
            o: usage.output_tokens || 0,
            ci: usage.cache_read_input_tokens || 0
          } : null;
          var blocks = m.blocks || [];

          for (var b = 0; b < blocks.length; b++) {
            var bl = blocks[b];
            if (bl.type === "thinking") {
              var thinkText = bl.thinking || "";
              var words = thinkText.split(/\s+/).filter(Boolean).length;
              turns.push({ type: "think", ms: ms, words: words,
                preview: thinkText.substring(0, 100), full: thinkText });
            } else if (bl.type === "text") {
              turns.push({ type: "text", ms: ms, tok: tok,
                preview: (bl.text || "").substring(0, 120), full: bl.text || "" });
            } else if (bl.type === "tool_use") {
              var inputStr = JSON.stringify(bl.input, null, 2);
              turns.push({ type: "tool", ms: ms, name: bl.name, tok: tok,
                preview: toolInputPreview(bl.name, bl.input), full: inputStr });
            }
          }
        }
      }
      return turns;
    }

    // Per-tool-name badge colors — well-known tools get hand-picked colors,
    // everything else gets a deterministic hue from the name hash.
    var _toolColorMap = {
      Read:   { bg: "rgba(21,101,192,0.12)",  fg: "#1565c0" },   // blue
      Write:  { bg: "rgba(46,125,50,0.14)",   fg: "#2e7d32" },   // green
      Edit:   { bg: "rgba(230,81,0,0.12)",    fg: "#e65100" },   // orange
      Bash:   { bg: "rgba(183,28,28,0.12)",   fg: "#b71c1c" },   // red
      Grep:   { bg: "rgba(106,27,154,0.12)",  fg: "#6a1b9a" },   // deep purple
      Glob:   { bg: "rgba(74,20,140,0.10)",   fg: "#4a148c" },   // indigo
      Skill:  { bg: "rgba(255,143,0,0.14)",   fg: "#bf360c" },   // deep orange
      Agent:  { bg: "rgba(0,105,92,0.14)",    fg: "#00695c" },   // teal
    };
    var _toolColorCache = {};
    function toolColor(name) {
      if (_toolColorMap[name]) return _toolColorMap[name];
      if (_toolColorCache[name]) return _toolColorCache[name];
      // Deterministic hue from name
      var hash = 0;
      for (var i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) | 0;
      var hue = ((hash % 360) + 360) % 360;
      _toolColorCache[name] = {
        bg: "hsla(" + hue + ",50%,50%,0.12)",
        fg: "hsl(" + hue + ",55%,35%)"
      };
      return _toolColorCache[name];
    }

    function fmtTime(ms) {
      if (ms < 1000) return ms + "ms";
      if (ms < 60000) return (ms / 1000).toFixed(1) + "s";
      var m = Math.floor(ms / 60000);
      var s = Math.round((ms % 60000) / 1000);
      return m + "m " + s + "s";
    }

    function buildTranscriptFromTurns(turns) {
      if (!turns || turns.length === 0) return null;

      const wrap = document.createElement("div");
      wrap.className = "transcript-scroll";

      // Summary header: total tokens, turns, duration
      var totalIn = 0, totalOut = 0, totalCache = 0, apiCalls = 0;
      var maxMs = 0;
      var seenTok = new Set();
      for (var s = 0; s < turns.length; s++) {
        if (turns[s].ms > maxMs) maxMs = turns[s].ms;
        if (turns[s].tok && !seenTok.has(turns[s].tok)) {
          seenTok.add(turns[s].tok);
          totalIn += turns[s].tok.i;
          totalOut += turns[s].tok.o;
          totalCache += turns[s].tok.ci || 0;
          apiCalls++;
        }
      }
      if (apiCalls > 0) {
        var summary = document.createElement("div");
        summary.className = "transcript-summary-bar";
        var parts = [];
        parts.push(apiCalls + " API call" + (apiCalls !== 1 ? "s" : ""));
        parts.push(fmtNum(totalIn) + " in");
        parts.push(fmtNum(totalOut) + " out");
        if (totalCache > 0) parts.push(fmtNum(totalCache) + " cached");
        if (maxMs > 0) parts.push(fmtTime(maxMs) + " elapsed");
        summary.textContent = parts.join(" \u00b7 ");
        wrap.appendChild(summary);
      }

      for (const t of turns) {
        const row = document.createElement("div");
        row.className = "transcript-row";

        // Badge
        const badge = document.createElement("span");
        badge.className = "t-badge";
        if (t.type === "user") { badge.textContent = "USER"; badge.classList.add("t-badge-user"); }
        else if (t.type === "think") { badge.textContent = "THINK"; badge.classList.add("t-badge-think"); }
        else if (t.type === "text") { badge.textContent = "TEXT"; badge.classList.add("t-badge-text"); }
        else if (t.type === "tool") {
          badge.textContent = t.name || "TOOL";
          badge.classList.add("t-badge-tool");
          var tc = toolColor(t.name || "TOOL");
          badge.style.background = tc.bg;
          badge.style.color = tc.fg;
        }
        else if (t.type === "result") { badge.textContent = "RESULT"; badge.classList.add("t-badge-result"); }
        row.appendChild(badge);

        // Time
        const time = document.createElement("span");
        time.className = "t-time";
        time.textContent = "+" + fmtTime(t.ms);
        row.appendChild(time);

        // Status for results
        if (t.type === "result") {
          const st = document.createElement("span");
          st.className = "t-status " + (t.ok ? "t-status-ok" : "t-status-err");
          st.textContent = t.ok ? "\u2713" : "\u2717";
          row.appendChild(st);
        }

        // Preview (collapsed single line)
        const prev = document.createElement("span");
        prev.className = "t-preview";
        if (t.type === "think" && t.words) prev.textContent = "~" + t.words + " words \u00b7 " + (t.preview || "");
        else prev.textContent = t.preview || "";
        row.appendChild(prev);

        // Tokens
        if (t.tok) {
          const tok = document.createElement("span");
          tok.className = "t-tokens";
          var label = "in:" + fmtNum(t.tok.i) + " out:" + fmtNum(t.tok.o);
          if (t.tok.ci) label += " cache:" + fmtNum(t.tok.ci);
          tok.textContent = label;
          row.appendChild(tok);
        }

        // Click to expand/collapse full content
        if (t.full && t.full.length > (t.preview || "").length) {
          row.style.cursor = "pointer";
          const fullDiv = document.createElement("div");
          fullDiv.className = "t-expanded";
          fullDiv.style.display = "none";
          const pre = document.createElement("pre");
          pre.textContent = t.full;
          fullDiv.appendChild(pre);

          row.onclick = function(e) {
            const expanded = fullDiv.style.display !== "none";
            fullDiv.style.display = expanded ? "none" : "block";
            row.classList.toggle("expanded", !expanded);
          };

          // Append full content after the row (sibling, not child — keeps row layout clean)
          const fragment = document.createDocumentFragment();
          fragment.appendChild(row);
          fragment.appendChild(fullDiv);
          wrap.appendChild(fragment);
        } else {
          wrap.appendChild(row);
        }
      }

      return wrap;
    }

    // ---- Grid helpers for paired view ----
    function addGridRow(grid, htmlParts) {
      const row = document.createElement("div");
      row.className = "split-row";
      for (const html of htmlParts) {
        const cell = document.createElement("div");
        cell.innerHTML = html;
        row.appendChild(cell);
      }
      grid.appendChild(row);
    }

    function buildGradesSectionHtml(grading) {
      return '<div class="section">' +
        '<div class="section-header">Grades</div>' +
        '<div class="section-body">' + buildGradesHtml(grading) + '</div>' +
        '</div>';
    }

    // ---- Paired grades with row-aligned assertions via subgrid ----
    function renderPairedGrades(grid, withGrading, withoutGrading) {
      const withExps = withGrading?.expectations || [];
      const withoutExps = withoutGrading?.expectations || [];

      // Collect all unique assertion texts, preserving order
      const allTexts = [];
      const seen = new Set();
      for (const exp of [...withExps, ...withoutExps]) {
        if (!seen.has(exp.text)) {
          seen.add(exp.text);
          allTexts.push(exp.text);
        }
      }

      // Total rows: header + summary + N assertions
      const totalRows = 2 + allTexts.length;

      const pair = document.createElement("div");
      pair.className = "grades-pair";
      pair.style.gridTemplateRows = "repeat(" + totalRows + ", auto)";

      // Build left (with) and right (without) columns
      for (let side = 0; side < 2; side++) {
        const grading = side === 0 ? withGrading : withoutGrading;
        const exps = side === 0 ? withExps : withoutExps;
        const summary = grading?.summary || {};

        const col = document.createElement("div");
        col.className = "grades-col";

        // Header row
        const headerDiv = document.createElement("div");
        headerDiv.className = "section-header";
        headerDiv.textContent = "Grades";
        col.appendChild(headerDiv);

        // Summary row
        const summaryDiv = document.createElement("div");
        summaryDiv.className = "grades-summary-row";
        if (grading) {
          const passRate = summary.pass_rate != null ? Math.round(summary.pass_rate * 100) + "%" : "?";
          const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
          summaryDiv.innerHTML =
            '<div class="grades-summary">' +
            '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>' +
            '<span>' + (summary.passed || 0) + ' passed, ' + (summary.failed || 0) + ' failed of ' + (summary.total || 0) + '</span>' +
            '</div>';
        } else {
          summaryDiv.innerHTML = '<span style="color:var(--text-muted);font-style:italic;">No grades</span>';
        }
        col.appendChild(summaryDiv);

        // One row per assertion
        for (const text of allTexts) {
          const exp = exps.find(e => e.text === text);
          const rowDiv = document.createElement("div");
          rowDiv.className = "grades-assertion-row";
          if (exp) {
            const statusClass = exp.passed ? "pass" : "fail";
            const statusIcon = exp.passed ? "\u2713" : "\u2717";
            rowDiv.innerHTML =
              '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>' +
              '<span>' + escapeHtml(exp.text) + '</span>' +
              (exp.evidence ? '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>' : '');
          } else {
            rowDiv.innerHTML = '<span style="color:var(--text-muted);">—</span>';
          }
          col.appendChild(rowDiv);
        }

        pair.appendChild(col);
      }

      grid.appendChild(pair);
    }

    function renderSingleOutputFile(container, file) {
      const fileDiv = document.createElement("div");
      fileDiv.className = "output-file";

      const header = document.createElement("div");
      header.className = "output-file-header";
      const nameSpan = document.createElement("span");
      nameSpan.textContent = file.name;
      header.appendChild(nameSpan);
      const dlBtn = document.createElement("a");
      dlBtn.className = "dl-btn";
      dlBtn.textContent = "Download";
      dlBtn.download = file.name;
      dlBtn.href = getDownloadUri(file);
      header.appendChild(dlBtn);
      fileDiv.appendChild(header);

      const content = document.createElement("div");
      content.className = "output-file-content";

      renderFileContent(content, file);

      fileDiv.appendChild(content);
      container.appendChild(fileDiv);
    }

    // ---- Build grades HTML ----
    function buildGradesHtml(grading) {
      const summary = grading.summary || {};
      const expectations = grading.expectations || [];

      let html = "";
      const passRate = summary.pass_rate != null
        ? Math.round(summary.pass_rate * 100) + "%"
        : "?";
      const badgeClass = summary.pass_rate >= 0.8 ? "grade-pass" : summary.pass_rate >= 0.5 ? "" : "grade-fail";
      html += '<div class="grades-summary">';
      html += '<span class="grade-badge ' + badgeClass + '">' + passRate + '</span>';
      html += '<span>' + (summary.passed || 0) + ' passed, ' + (summary.failed || 0) + ' failed of ' + (summary.total || 0) + '</span>';
      html += '</div>';

      html += '<ul class="assertion-list">';
      for (const exp of expectations) {
        const statusClass = exp.passed ? "pass" : "fail";
        const statusIcon = exp.passed ? "\u2713" : "\u2717";
        html += '<li class="assertion-item">';
        html += '<span class="assertion-status ' + statusClass + '">' + statusIcon + '</span>';
        html += '<span>' + escapeHtml(exp.text) + '</span>';
        if (exp.evidence) {
          html += '<div class="assertion-evidence">' + escapeHtml(exp.evidence) + '</div>';
        }
        html += '</li>';
      }
      html += '</ul>';
      return html;
    }

    // ---- Render output files ----
    function renderOutputFiles(container, outputs) {
      if (outputs.length === 0) {
        container.innerHTML = '<div class="empty-state">No output files</div>';
        return;
      }

      for (const file of outputs) {
        const fileDiv = document.createElement("div");
        fileDiv.className = "output-file";

        const header = document.createElement("div");
        header.className = "output-file-header";
        const nameSpan = document.createElement("span");
        nameSpan.textContent = file.name;
        header.appendChild(nameSpan);
        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.textContent = "Download";
        dlBtn.download = file.name;
        dlBtn.href = getDownloadUri(file);
        header.appendChild(dlBtn);
        fileDiv.appendChild(header);

        const content = document.createElement("div");
        content.className = "output-file-content";

        renderFileContent(content, file);

        fileDiv.appendChild(content);
        container.appendChild(fileDiv);
      }
    }

    // ---- Shared file content renderer ----
    function renderFileContent(content, file) {
      if (file.type === "text") {
        if (file.name.endsWith(".md")) {
          const div = document.createElement("div");
          div.className = "rendered-markdown";
          div.innerHTML = marked.parse(file.content);
          // Highlight any code blocks inside the rendered markdown
          div.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
          content.appendChild(div);
        } else if (file.name.endsWith(".py")) {
          const pre = document.createElement("pre");
          const code = document.createElement("code");
          code.className = "language-python";
          code.textContent = file.content;
          pre.appendChild(code);
          content.appendChild(pre);
          hljs.highlightElement(code);
        } else {
          const pre = document.createElement("pre");
          pre.textContent = file.content;
          content.appendChild(pre);
        }
      } else if (file.type === "image") {
        const img = document.createElement("img");
        img.src = file.data_uri;
        img.alt = file.name;
        content.appendChild(img);
      } else if (file.type === "pdf") {
        const iframe = document.createElement("iframe");
        iframe.src = file.data_uri;
        content.appendChild(iframe);
      } else if (file.type === "xlsx") {
        renderXlsx(content, file.data_b64);
      } else if (file.type === "binary" && file.name === "raw.jsonl") {
        // raw.jsonl: decode base64, parse JSONL events, render transcript viewer
        var events = decodeJsonlBase64(file.data_uri);
        var turns = jsonlToTurns(events);
        var txEl = buildTranscriptFromTurns(turns);
        if (txEl) content.appendChild(txEl);
        const a = document.createElement("a");
        a.className = "download-link";
        a.href = file.data_uri;
        a.download = file.name;
        a.textContent = "Download " + file.name;
        a.style.marginTop = txEl ? "0.75rem" : "0";
        content.appendChild(a);
      } else if (file.type === "binary") {
        const a = document.createElement("a");
        a.className = "download-link";
        a.href = file.data_uri;
        a.download = file.name;
        a.textContent = "Download " + file.name;
        content.appendChild(a);
      } else if (file.type === "error") {
        const pre = document.createElement("pre");
        pre.textContent = file.content;
        pre.style.color = "var(--red)";
        content.appendChild(pre);
      }
    }

    // ---- XLSX rendering via SheetJS ----
    function renderXlsx(container, b64Data) {
      try {
        const raw = Uint8Array.from(atob(b64Data), c => c.charCodeAt(0));
        const wb = XLSX.read(raw, { type: "array" });

        for (let i = 0; i < wb.SheetNames.length; i++) {
          const sheetName = wb.SheetNames[i];
          const ws = wb.Sheets[sheetName];

          if (wb.SheetNames.length > 1) {
            const sheetLabel = document.createElement("div");
            sheetLabel.style.cssText =
              "font-weight:600; font-size:0.8rem; color:#b0aea5; margin-top:0.5rem; margin-bottom:0.25rem;";
            sheetLabel.textContent = "Sheet: " + sheetName;
            container.appendChild(sheetLabel);
          }

          const htmlStr = XLSX.utils.sheet_to_html(ws, { editable: false });
          const wrapper = document.createElement("div");
          wrapper.innerHTML = htmlStr;
          container.appendChild(wrapper);
        }
      } catch (err) {
        container.textContent = "Error rendering spreadsheet: " + err.message;
      }
    }

    // ---- Keyboard nav ----
    document.addEventListener("keydown", (e) => {
      if (e.target.tagName === "SELECT") return;
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        navigate(-1);
      } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        navigate(1);
      }
    });

    // ---- Util ----
    function fmtNum(n) {
      if (n == null) return "—";
      return n.toLocaleString("en-US");
    }

    function getDownloadUri(file) {
      if (file.data_uri) return file.data_uri;
      if (file.data_b64) return "data:application/octet-stream;base64," + file.data_b64;
      if (file.type === "text") return "data:text/plain;charset=utf-8," + encodeURIComponent(file.content);
      return "#";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- View switching ----
    function switchView(view) {
      document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`[onclick="switchView('${view}')"]`).classList.add("active");
      document.getElementById("panel-" + view).classList.add("active");
    }

    // ---- Benchmark rendering ----
    function renderBenchmark() {
      const data = EMBEDDED_DATA.benchmark;
      if (!data) return;

      document.getElementById("view-tabs").style.display = "flex";

      const container = document.getElementById("benchmark-content");
      const runSummary = data.run_summary || {};
      const metadata = data.metadata || {};
      const notes = data.notes || [];

      let html = "";

      // Header
      html += "<h2 style='font-family: Poppins, sans-serif; margin-bottom: 1rem;'>Benchmark Results</h2>";
      html += '<div class="benchmark-meta">';
      if (metadata.executor_model) {
        html += '<div class="benchmark-meta-item"><span class="benchmark-meta-label">Model</span><span class="benchmark-meta-value">' + escapeHtml(metadata.executor_model) + '</span></div>';
      }
      if (metadata.effort) {
        html += '<div class="benchmark-meta-item"><span class="benchmark-meta-label">Effort</span><span class="benchmark-meta-value">' + escapeHtml(metadata.effort) + '</span></div>';
      }
      if (metadata.evals_run) {
        html += '<div class="benchmark-meta-item"><span class="benchmark-meta-label">Evals</span><span class="benchmark-meta-value">' + metadata.evals_run.length + '</span></div>';
      }
      html += '<div class="benchmark-meta-item"><span class="benchmark-meta-label">Runs / Config</span><span class="benchmark-meta-value">' + (metadata.runs_per_configuration || "?") + '</span></div>';
      if (metadata.timestamp) {
        html += '<div class="benchmark-meta-item"><span class="benchmark-meta-label">Date</span><span class="benchmark-meta-value">' + escapeHtml(metadata.timestamp) + '</span></div>';
      }
      if (metadata.skill_name) {
        html += '<div class="benchmark-meta-item"><span class="benchmark-meta-label">Skill</span><span class="benchmark-meta-value">' + escapeHtml(metadata.skill_name) + '</span></div>';
      }
      html += '</div>';

      // Per-eval breakdown
      const runs = data.runs || [];
      if (runs.length > 0) {
        const evalIds = [...new Set(runs.map(r => r.eval_id))].sort((a, b) => a - b);

        // Overview table — one row per eval, clickable to outputs view
        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>Overview</h3>";
        html += '<table class="benchmark-table" style="table-layout:auto;">';
        html += "<thead>";
        html += '<tr><th rowspan="2" style="vertical-align:bottom;">Eval</th>';
        html += '<th colspan="4" class="group-with">With Skill</th>';
        html += '<th colspan="4" class="group-without">Without Skill</th></tr>';
        html += "<tr>";
        html += '<th class="sub-with">Pass</th><th class="sub-with">Time</th><th class="sub-with">Tokens</th><th class="sub-with">Turns</th>';
        html += '<th class="sub-without group-sep">Pass</th><th class="sub-without">Time</th><th class="sub-without">Tokens</th><th class="sub-without">Turns</th>';
        html += "</tr></thead><tbody>";

        // Build a map from eval_name to evalGroups index for navigation
        const evalGroupIndex = {};
        for (let i = 0; i < evalGroups.length; i++) {
          evalGroupIndex[evalGroups[i].eval_name] = i;
        }

        function compactTokens(n) {
          if (!n) return "&mdash;";
          if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
          if (n >= 1000) return (n / 1000).toFixed(0) + "K";
          return String(n);
        }

        for (const evalId of evalIds) {
          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "Eval " + evalId;
          const groupIdx = evalGroupIndex[evalName];
          const clickAttr = groupIdx != null ? ' onclick="switchView(\'outputs\'); showEval(' + groupIdx + ');"' : '';
          const wRun = evalRuns.find(r => r.configuration === "with_skill");
          const woRun = evalRuns.find(r => r.configuration === "without_skill");
          const wR = wRun ? wRun.result || {} : {};
          const woR = woRun ? woRun.result || {} : {};

          function fmtPass(r) {
            if (r.pass_rate == null) return "&mdash;";
            var pct = (r.pass_rate * 100).toFixed(0);
            return "<strong>" + pct + "%</strong> <span style='opacity:.45;font-size:.75rem;'>" + (r.passed||0) + "/" + (r.total||0) + "</span>";
          }
          function fmtTime(r) { return r.time_seconds != null ? Math.round(r.time_seconds) + "s" : "&mdash;"; }
          function fmtTurns(r) { return r.num_turns ? r.num_turns : "&mdash;"; }

          // Compare each metric: higher is better for pass, lower is better for time/tokens/turns
          function win(wVal, woVal, lowerIsBetter) {
            if (wVal == null || woVal == null || wVal === woVal) return ["", ""];
            var wBetter = lowerIsBetter ? wVal < woVal : wVal > woVal;
            return wBetter ? [" winner-with", ""] : ["", " winner-without"];
          }
          var pr  = win(wR.pass_rate, woR.pass_rate, false);
          var tm  = win(wR.time_seconds, woR.time_seconds, true);
          var tok = win(wR.tokens, woR.tokens, true);
          var tn  = win(wR.num_turns, woR.num_turns, true);

          html += '<tr class="benchmark-overview-row"' + clickAttr + '>';
          html += "<td>" + escapeHtml(evalName.replace(/-/g, " ")) + "</td>";
          html += '<td class="num' + pr[0] + '">' + fmtPass(wR) + "</td>";
          html += '<td class="num' + tm[0] + '">' + fmtTime(wR) + "</td>";
          html += '<td class="num' + tok[0] + '">' + compactTokens(wR.tokens) + "</td>";
          html += '<td class="num' + tn[0] + '">' + fmtTurns(wR) + "</td>";
          html += '<td class="num group-sep' + pr[1] + '">' + fmtPass(woR) + "</td>";
          html += '<td class="num' + tm[1] + '">' + fmtTime(woR) + "</td>";
          html += '<td class="num' + tok[1] + '">' + compactTokens(woR.tokens) + "</td>";
          html += '<td class="num' + tn[1] + '">' + fmtTurns(woR) + "</td>";
          html += "</tr>";
        }

        // Averages / totals footer row
        var wRuns = runs.filter(function(r) { return r.configuration === "with_skill" && r.result; });
        var woRuns = runs.filter(function(r) { return r.configuration === "without_skill" && r.result; });
        function tot(arr, key) {
          var vals = arr.map(function(r) { return r.result[key]; }).filter(function(v) { return v != null; });
          return vals.length ? vals.reduce(function(a, b) { return a + b; }, 0) : null;
        }
        function avg(arr, key) {
          var vals = arr.map(function(r) { return r.result[key]; }).filter(function(v) { return v != null; });
          return vals.length ? vals.reduce(function(a, b) { return a + b; }, 0) / vals.length : null;
        }

        var wS = runSummary.with_skill || {};
        var woS = runSummary.without_skill || {};

        function fmtStatPct(stat) {
          if (!stat || stat.mean == null) return "&mdash;";
          var m = (stat.mean * 100).toFixed(0);
          var s = (stat.stddev * 100).toFixed(0);
          return "<strong>" + m + "%</strong> <span style='opacity:.5;font-size:.65rem;'>&plusmn;" + s + "%</span>";
        }
        function fmtStatNum(stat, suffix) {
          if (!stat || stat.mean == null) return "&mdash;";
          var m = Math.round(stat.mean);
          var s = Math.round(stat.stddev);
          return m + (suffix||"") + " <span style='opacity:.5;font-size:.65rem;'>&plusmn;" + s + "</span>";
        }

        html += '<tfoot><tr class="benchmark-overview-footer">';
        html += '<td><strong>Avg / Total</strong></td>';
        html += '<td class="num">' + fmtStatPct(wS.pass_rate) + '</td>';
        html += '<td class="num">' + fmtStatNum(wS.time_seconds, "s") + '</td>';
        html += '<td class="num">' + compactTokens(tot(wRuns, "tokens")) + '</td>';
        html += '<td class="num">' + (avg(wRuns, "num_turns") != null ? avg(wRuns, "num_turns").toFixed(1) : "&mdash;") + '</td>';
        html += '<td class="num group-sep">' + fmtStatPct(woS.pass_rate) + '</td>';
        html += '<td class="num">' + fmtStatNum(woS.time_seconds, "s") + '</td>';
        html += '<td class="num">' + compactTokens(tot(woRuns, "tokens")) + '</td>';
        html += '<td class="num">' + (avg(woRuns, "num_turns") != null ? avg(woRuns, "num_turns").toFixed(1) : "&mdash;") + '</td>';
        html += '</tr></tfoot>';

        html += "</table>";

        // Recommendation summaries (generated by summarize stage)
        var recSummaries = data.recommendation_summaries || {};
        var recConfigs = Object.keys(recSummaries);
        if (recConfigs.length > 0) {
          html += "<h3 style='font-family: Poppins, sans-serif; margin: 1.5rem 0 0.75rem;'>Common Issues Summary</h3>";
          if (recConfigs.length === 1) {
            var label = recConfigs[0].replace(/_/g, " ").replace(/\b\w/g, function(c) { return c.toUpperCase(); });
            html += '<div class="rec-summary-card">';
            html += '<div class="rec-summary-label">' + escapeHtml(label) + '</div>';
            html += '<div class="rec-summary-body rendered-markdown">' + marked.parse(recSummaries[recConfigs[0]]) + '</div>';
            html += '</div>';
          } else {
            html += '<div class="rec-summary-grid">';
            for (var ri = 0; ri < recConfigs.length; ri++) {
              var rKey = recConfigs[ri];
              var rLabel = rKey.replace(/_/g, " ").replace(/\b\w/g, function(c) { return c.toUpperCase(); });
              var cardClass = rKey === "with_skill" ? "rec-card-with" : "rec-card-without";
              html += '<div class="rec-summary-card ' + cardClass + '">';
              html += '<div class="rec-summary-label">' + escapeHtml(rLabel) + '</div>';
              html += '<div class="rec-summary-body rendered-markdown">' + marked.parse(recSummaries[rKey]) + '</div>';
              html += '</div>';
            }
            html += '</div>';
          }
        }

        html += "<h3 style='font-family: Poppins, sans-serif; margin-bottom: 0.75rem;'>Per-Eval Breakdown</h3>";

        const hasTime = runs.some(r => r.result && r.result.time_seconds != null);
        const hasErrors = runs.some(r => r.result && r.result.errors > 0);

        for (let ei = 0; ei < evalIds.length; ei++) {
          const evalId = evalIds[ei];

          // HR divider between evals
          if (ei > 0) {
            html += '<hr class="benchmark-eval-divider">';
          }

          const evalRuns = runs.filter(r => r.eval_id === evalId);
          const evalName = evalRuns[0] && evalRuns[0].eval_name ? evalRuns[0].eval_name : "Eval " + evalId;

          html += '<h4 id="bench-eval-' + evalId + '" style="font-family: Poppins, sans-serif; margin: 1rem 0 0.5rem; color: var(--text);">' + escapeHtml(evalName) + "</h4>";
          html += '<table class="benchmark-table">';
          html += "<thead><tr><th>Config</th><th>Run</th><th>Pass Rate</th>";
          if (hasTime) html += "<th>Time (s)</th>";
          if (hasErrors) html += "<th>Crashes During Execution</th>";
          html += "</tr></thead>";
          html += "<tbody>";

          const configGroups = [...new Set(evalRuns.map(r => r.configuration))];
          for (let ci = 0; ci < configGroups.length; ci++) {
            const config = configGroups[ci];
            const configRuns = evalRuns.filter(r => r.configuration === config);
            if (configRuns.length === 0) continue;

            const rowClass = ci === 0 ? "benchmark-row-with" : "benchmark-row-without";
            const configLabel = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());

            for (const run of configRuns) {
              const r = run.result || {};
              const prClass = r.pass_rate >= 0.8 ? "benchmark-delta-positive" : r.pass_rate < 0.5 ? "benchmark-delta-negative" : "";
              html += '<tr class="' + rowClass + '">';
              html += "<td>" + configLabel + "</td>";
              html += "<td>" + run.run_number + "</td>";
              html += '<td class="' + prClass + '">' + ((r.pass_rate || 0) * 100).toFixed(0) + "% (" + fmtNum(r.passed || 0) + "/" + fmtNum(r.total || 0) + ")</td>";
              if (hasTime) html += "<td>" + (r.time_seconds != null ? fmtNum(parseFloat(r.time_seconds.toFixed(1))) : "&mdash;") + "</td>";
              if (hasErrors) html += "<td>" + fmtNum(r.errors || 0) + "</td>";
              html += "</tr>";
            }

            const rates = configRuns.map(r => (r.result || {}).pass_rate || 0);
            const avgRate = rates.reduce((a, b) => a + b, 0) / rates.length;
            const avgPrClass = avgRate >= 0.8 ? "benchmark-delta-positive" : avgRate < 0.5 ? "benchmark-delta-negative" : "";
            html += '<tr class="benchmark-row-avg ' + rowClass + '">';
            html += "<td>" + configLabel + "</td>";
            html += "<td>Avg</td>";
            html += '<td class="' + avgPrClass + '">' + (avgRate * 100).toFixed(0) + "%</td>";
            if (hasTime) {
              const times = configRuns.map(r => (r.result || {}).time_seconds).filter(t => t != null);
              html += "<td>" + (times.length ? fmtNum(parseFloat((times.reduce((a, b) => a + b, 0) / times.length).toFixed(1))) : "&mdash;") + "</td>";
            }
            if (hasErrors) html += "<td></td>";
            html += "</tr>";
          }
          html += "</tbody></table>";

          // Per-assertion detail
          const runsWithExpectations = {};
          for (const config of configGroups) {
            runsWithExpectations[config] = evalRuns.filter(r => r.configuration === config && r.expectations && r.expectations.length > 0);
          }
          const hasAnyExpectations = Object.values(runsWithExpectations).some(runs => runs.length > 0);
          if (hasAnyExpectations) {
            const allAssertions = [];
            const seen = new Set();
            for (const config of configGroups) {
              for (const run of runsWithExpectations[config]) {
                for (const exp of (run.expectations || [])) {
                  if (!seen.has(exp.text)) {
                    seen.add(exp.text);
                    allAssertions.push(exp.text);
                  }
                }
              }
            }

            html += '<table class="benchmark-table" style="margin-top: 0.5rem;">';
            html += "<thead><tr><th>Assertion</th>";
            for (const config of configGroups) {
              const label = config.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
              html += "<th>" + escapeHtml(label) + "</th>";
            }
            html += "</tr></thead><tbody>";

            for (const assertionText of allAssertions) {
              html += "<tr><td>" + escapeHtml(assertionText) + "</td>";

              for (const config of configGroups) {
                html += "<td>";
                for (const run of runsWithExpectations[config]) {
                  const exp = (run.expectations || []).find(e => e.text === assertionText);
                  if (exp) {
                    const cls = exp.passed ? "benchmark-delta-positive" : "benchmark-delta-negative";
                    const icon = exp.passed ? "\u2713" : "\u2717";
                    html += '<span class="' + cls + '" title="Run ' + run.run_number + ': ' + escapeHtml(exp.evidence || "") + '">' + icon + "</span> ";
                  } else {
                    html += "&mdash; ";
                  }
                }
                html += "</td>";
              }
              html += "</tr>";
            }
            html += "</tbody></table>";
          }
        }
      }

      // Notes
      if (notes.length > 0) {
        html += '<div class="benchmark-notes">';
        html += "<h3>Analysis Notes</h3>";
        html += "<ul>";
        for (const note of notes) {
          html += "<li>" + escapeHtml(note) + "</li>";
        }
        html += "</ul></div>";
      }

      container.innerHTML = html;
    }

    // ---- Skill Tokens rendering ----
    function renderSkillTokens() {
      const data = EMBEDDED_DATA.benchmark;
      if (!data || !data.skill_tokens) return;

      document.getElementById("view-tabs").style.display = "flex";

      const st = data.skill_tokens;
      const container = document.getElementById("skill-tokens-content");
      const files = st.files || [];
      const maxTokens = Math.max(...files.map(f => f.tokens), 1);

      let html = "";
      html += "<h2 style='font-family: Poppins, sans-serif; margin-bottom: 1rem;'>Skill Token Counts</h2>";

      html += '<div class="token-summary-card">';
      html += '<div class="token-summary-stat"><div class="stat-value">' + st.total_tokens.toLocaleString() + '</div><div class="stat-label">Total Tokens</div></div>';
      html += '<div class="token-summary-stat"><div class="stat-value">' + files.length + '</div><div class="stat-label">Files</div></div>';
      html += '<div class="token-summary-stat"><div class="stat-value">' + st.total_lines.toLocaleString() + '</div><div class="stat-label">Total Lines</div></div>';
      html += '<div class="token-summary-stat"><div class="stat-value">' + st.encoding + '</div><div class="stat-label">Encoding</div></div>';
      html += '</div>';

      html += '<table class="benchmark-table" style="table-layout: auto;">';
      html += '<thead><tr><th>File</th><th style="text-align:right;">Lines</th><th style="text-align:right;">Tokens</th><th style="text-align:right;">%</th><th style="min-width:200px;">Distribution</th></tr></thead>';
      html += '<tbody>';
      for (const f of files) {
        const pct = st.total_tokens > 0 ? (f.tokens / st.total_tokens * 100).toFixed(1) : "0.0";
        const barWidth = Math.round(f.tokens / maxTokens * 200);
        const isSkill = f.path === "SKILL.md";
        const barColor = isSkill ? "var(--accent)" : "var(--green, #4caf50)";
        html += '<tr>';
        html += '<td>' + escapeHtml(f.path) + '</td>';
        html += '<td style="text-align:right;">' + f.lines.toLocaleString() + '</td>';
        html += '<td style="text-align:right;font-weight:600;">' + f.tokens.toLocaleString() + '</td>';
        html += '<td style="text-align:right;">' + pct + '%</td>';
        html += '<td><div class="token-bar-container"><div class="token-bar" style="width:' + barWidth + 'px;background:' + barColor + ';"></div></div></td>';
        html += '</tr>';
      }
      html += '</tbody><tfoot><tr style="font-weight:600;">';
      html += '<td>Total</td>';
      html += '<td style="text-align:right;">' + st.total_lines.toLocaleString() + '</td>';
      html += '<td style="text-align:right;">' + st.total_tokens.toLocaleString() + '</td>';
      html += '<td style="text-align:right;">100%</td>';
      html += '<td></td>';
      html += '</tr></tfoot></table>';

      container.innerHTML = html;
    }

    // ---- Start ----
    buildEvalGroups();
    renderBenchmark();
    renderSkillTokens();
    init();
  </script>
</body>
</html>
